<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="profilepic.jpg" type="image/x-icon">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLIN XANDER</title>
    <style>
        @font-face {
            font-family: myFont;
            src: url(video.ttf);
        }

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            background-color: black;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes rotate {
            0% { transform: perspective(500px) rotateY(0deg); }
            100% { transform: perspective(500px) rotateY(360deg); }
        }

        .icon {
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            padding: 12px;
            text-decoration: none;
            font-style: italic;
            color: red;
            font-size: 27px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), -2px -2px 5px rgba(255, 255, 255, 0.2);
            transform: perspective(500px) rotateX(15deg);
            animation: glow 1s ease-in-out infinite alternate, rotate 10s linear infinite;
            z-index: 10;
        }

        .icon:hover {
            color: lime;
            transform: perspective(500px) rotateX(15deg) rotateY(10deg);
            transition: 0.6s;
        }

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        video {
            object-fit: cover;
            z-index: -1;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .button-container.prices {
            margin-top: 40px;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        button {
            font-family: myFont;
            color: white;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 30px;
            font-size: 25px;
            font-weight: bold;
            border: 2px solid white;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 -5px 10px rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            cursor: pointer;
            backdrop-filter: blur(5px);
        }

        button:hover {
            color: lime;
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 255, 0, 0.3), inset 0 -10px 20px rgba(255, 255, 255, 0.3);
            border-color: lime;
        }

        .prices button {
            color: red;
            border: 2px solid white;
        }

        .prices button:hover {
            color: lime;
            border-color: lime;
        }

        /* XANDER MIX button styling */
        #buttonXanderMix {
            color: #87CEEB; /* Light blue */
            border-color: #87CEEB;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.3), inset 0 -5px 10px rgba(255, 255, 255, 0.2);
        }

        #buttonXanderMix:hover {
            color: lime;
            border-color: lime;
            box-shadow: 0 10px 25px rgba(0, 255, 0, 0.3), inset 0 -10px 20px rgba(255, 255, 255, 0.3);
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: white;
            z-index: 10;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px red, 0 0 10px red; }
            100% { text-shadow: 0 0 10px red, 0 0 20px red, 0 0 30px red; }
        }

        @media screen and (max-width: 820px) {
            .icon {
                font-size: 20px;
                padding: 8px;
            }

            button {
                font-size: 22px;
                padding: 15px 25px;
            }

            .button-container {
                gap: 15px;
            }

            .button-container.prices {
                margin-top: 30px;
            }
        }

        @media screen and (max-width: 480px) {
            .icon {
                font-size: 18px;
                padding: 6px;
            }

            button {
                font-size: 18px;
                padding: 12px 20px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .button-container.prices {
                margin-top: 20px;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }
        }
    </style>
</head>
<body>
    <a href="./" class="icon">COLLIN XANDER</a>
    <div class="container">
        <div class="button-container">
            <form action="./Photos">
                <button id="btnOne">PHOTOS</button>
            </form>
            <form action="./videos">
                <button id="buttonTwo">VIDEOS</button>
            </form>
            <form action="./About">
                <button id="buttonAbout">ABOUT</button>
            </form>
        </div>
        <div class="button-container prices">
            <form action="./Contact">
                <button id="buttonPrices">CONTACT</button>
            </form>
            <form action="https://collinxander.com/Sound-Visualizer/">
                <button id="buttonXanderMix">XANDER MIX</button>
            </form>
        </div>
    </div>
    <video autoplay muted loop playsinline preload="none">
        <source src="homevideo.MP4" type="video/mp4">
    </video>
    <footer>
        © <script>document.write(new Date().getFullYear())</script> Collin Xander
    </footer>
</body>
</html>
