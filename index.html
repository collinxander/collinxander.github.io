<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="profilepic.jpg" type="image/x-icon">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLIN XANDER</title>
    <style>
        * {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            background-color: black;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            animation: fadeIn 1.5s ease-in-out;
            overflow-x: hidden;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes rotate {
            0% { transform: perspective(500px) rotateY(0deg); }
            100% { transform: perspective(500px) rotateY(360deg); }
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px red; }
            100% { text-shadow: 0 0 20px red; }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes buttonGlow {
            0% { opacity: 0; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(1.4); }
        }

        .portfolio-container {
            min-height: 100vh;
            position: relative;
        }

        .icon {
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            padding: 12px;
            text-decoration: none;
            font-style: italic;
            color: red;
            font-size: 27px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.3), -2px -2px 5px rgba(255, 255, 255, 0.2);
            transform: perspective(500px) rotateX(15deg);
            animation: glow 1s ease-in-out infinite alternate, rotate 10s linear infinite;
            z-index: 10;
            transition: all 0.6s ease;
        }

        .icon:hover {
            color: lime;
            transform: perspective(500px) rotateX(15deg) rotateY(10deg);
        }

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            z-index: 5;
        }

        video {
            object-fit: cover;
            z-index: -1;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .button-container.prices {
            margin-top: 40px;
        }

        .button-container.sound {
            color: rgb(91, 91, 255);
        }

        /* Enhanced Button Styles */
        button {
            position: relative;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color: white;
            border-radius: 50px;
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.3), rgba(255, 255, 255, 0.1));
            backdrop-filter: blur(10px);
            padding: 20px 30px;
            font-size: 25px;
            font-weight: bold;
            border: 2px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.2), 
                        inset 0 -1px 0 rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
            cursor: pointer;
            overflow: hidden;
        }

        .button-text {
            position: relative;
            z-index: 2;
            display: block;
            transition: all 0.3s ease;
        }

        .button-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.3) 0%, transparent 70%);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.3s ease;
            z-index: 1;
        }

        /* Navigation Buttons */
        .nav-button:hover {
            color: lime;
            border-color: rgba(0, 255, 0, 0.6);
            background: linear-gradient(145deg, rgba(0, 255, 0, 0.1), rgba(0, 0, 0, 0.4));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 255, 0, 0.2), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.3), 
                        inset 0 -1px 0 rgba(0, 0, 0, 0.3);
        }

        .nav-button:hover .button-glow {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.3) 0%, transparent 70%);
        }

        .nav-button:active {
            transform: translateY(-4px) scale(1.02);
        }

        /* Booking Button */
        .booking-button {
            color: red;
            border: 2px solid rgba(255, 0, 0, 0.5);
        }

        .booking-button:hover {
            color: lime;
            border-color: rgba(0, 255, 0, 0.6);
            background: linear-gradient(145deg, rgba(0, 255, 0, 0.1), rgba(255, 0, 0, 0.1));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 0, 0, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .booking-glow {
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3) 0%, transparent 70%);
        }

        .booking-button:hover .booking-glow {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 0, 0.4) 0%, transparent 70%);
        }

        /* Mix Button */
        .mix-button {
            color: #4444ff;
            border: 2px solid rgba(68, 68, 255, 0.5);
        }

        .mix-button:hover {
            color: cyan;
            border-color: rgba(0, 255, 255, 0.6);
            background: linear-gradient(145deg, rgba(0, 255, 255, 0.1), rgba(68, 68, 255, 0.1));
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 255, 255, 0.3), 
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }

        .mix-glow {
            background: radial-gradient(circle, rgba(68, 68, 255, 0.3) 0%, transparent 70%);
        }

        .mix-button:hover .mix-glow {
            width: 120px;
            height: 120px;
            background: radial-gradient(circle, rgba(0, 255, 255, 0.4) 0%, transparent 70%);
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: white;
            z-index: 5;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* Enhanced Responsive Design */
        @media screen and (max-width: 1024px) {
            button {
                font-size: 23px;
                padding: 18px 25px;
            }

            .button-container {
                gap: 15px;
            }
        }

        @media screen and (max-width: 820px) {
            .icon {
                font-size: 22px;
                padding: 10px;
            }

            button {
                font-size: 20px;
                padding: 16px 22px;
            }

            .button-container {
                gap: 12px;
                margin-top: 15px;
            }

            .button-container.prices {
                margin-top: 30px;
            }

            .button-container.sound {
                margin-top: 25px;
            }
        }

        @media screen and (max-width: 640px) {
            .icon {
                font-size: 20px;
                padding: 8px;
            }

            button {
                font-size: 18px;
                padding: 14px 20px;
                min-width: 140px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 15px;
                margin-top: 10px;
                width: 90%;
                max-width: 300px;
            }

            .button-container.prices {
                margin-top: 25px;
            }

            .button-container.sound {
                margin-top: 20px;
            }

            .container {
                padding: 0 20px;
            }
        }

        @media screen and (max-width: 480px) {
            .icon {
                font-size: 18px;
                padding: 6px;
            }

            button {
                font-size: 16px;
                padding: 12px 18px;
                min-width: 160px;
                border-radius: 40px;
            }

            .button-container {
                gap: 12px;
                width: 95%;
                max-width: 280px;
            }

            .button-container.prices {
                margin-top: 20px;
            }

            .button-container.sound {
                margin-top: 15px;
            }

            footer {
                font-size: 12px;
                bottom: 5px;
            }
        }

        @media screen and (max-width: 360px) {
            .icon {
                font-size: 16px;
                padding: 5px;
            }

            button {
                font-size: 14px;
                padding: 10px 16px;
                min-width: 140px;
            }

            .button-container {
                gap: 10px;
            }

            .container {
                padding: 0 15px;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) and (pointer: coarse) {
            button {
                padding: 16px 24px;
                font-size: 18px;
                min-height: 50px;
                touch-action: manipulation;
            }

            button:active {
                transform: translateY(-2px) scale(0.98);
                transition: all 0.1s ease;
            }

            .nav-button:active {
                color: lime;
                border-color: rgba(0, 255, 0, 0.6);
                background: linear-gradient(145deg, rgba(0, 255, 0, 0.2), rgba(0, 0, 0, 0.4));
            }

            .booking-button:active {
                color: lime;
                border-color: rgba(0, 255, 0, 0.6);
                background: linear-gradient(145deg, rgba(0, 255, 0, 0.2), rgba(255, 0, 0, 0.1));
            }

            .mix-button:active {
                color: cyan;
                border-color: rgba(0, 255, 255, 0.6);
                background: linear-gradient(145deg, rgba(0, 255, 255, 0.2), rgba(68, 68, 255, 0.1));
            }
        }

        /* High DPI displays */
        @media (-webkit-min-device-pixel-ratio: 2), (min-resolution: 192dpi) {
            .icon {
                text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5), -1px -1px 2px rgba(255, 255, 255, 0.3);
            }

            button {
                box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4), 
                            inset 0 0.5px 0 rgba(255, 255, 255, 0.3), 
                            inset 0 -0.5px 0 rgba(0, 0, 0, 0.3);
            }
        }

        /* Loading animation for video */
        .video-loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
            z-index: 1;
        }

        .loading-spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="portfolio-container">
        <a href="./" class="icon">COLLIN XANDER</a>

        <div class="container">
            <div class="button-container">
                <form action="./Photos">
                    <button id="btnOne" class="nav-button">
                        <span class="button-text">PHOTOS</span>
                        <div class="button-glow"></div>
                    </button>
                </form>
                <form action="./videos">
                    <button id="buttonTwo" class="nav-button">
                        <span class="button-text">VIDEOS</span>
                        <div class="button-glow"></div>
                    </button>
                </form>
                <form action="./About">
                    <button id="buttonAbout" class="nav-button">
                        <span class="button-text">ABOUT</span>
                        <div class="button-glow"></div>
                    </button>
                </form>
            </div>

            <div class="button-container prices">
                <form action="./Contact">
                    <button id="buttonPrices" class="booking-button">
                        <span class="button-text">BOOKINGS</span>
                        <div class="button-glow booking-glow"></div>
                    </button>
                </form>
            </div>

            <div class="button-container sound">
                <form action="./Sound-Visualizer">
                    <button id="soundvisual" class="mix-button">
                        <span class="button-text">XANDER MIX</span>
                        <div class="button-glow mix-glow"></div>
                    </button>
                </form>
            </div>
        </div>

        <div class="video-loading" id="videoLoading">
            <div class="loading-spinner"></div>
            Loading...
        </div>

        <video autoplay muted loop playsinline preload="none" id="backgroundVideo">
            <source src="homevideo.MP4" type="video/mp4">
        </video>

        <footer>&copy; 2025 Collin Xander</footer>
    </div>

    <script>
        // Enhanced button interactions
        document.addEventListener('DOMContentLoaded', function() {
            const buttons = document.querySelectorAll('button');
            const video = document.getElementById('backgroundVideo');
            const videoLoading = document.getElementById('videoLoading');

            // Add click sound effect (optional - requires sound file)
            function playClickSound() {
                // Uncomment and add sound file if desired
                // const audio = new Audio('click-sound.mp3');
                // audio.volume = 0.3;
                // audio.play().catch(e => console.log('Sound play failed:', e));
            }

            // Enhanced button interactions
            buttons.forEach(button => {
                button.addEventListener('click', function(e) {
                    playClickSound();
                    
                    // Add ripple effect
                    const ripple = document.createElement('div');
                    const rect = button.getBoundingClientRect();
                    const size = Math.max(rect.width, rect.height);
                    const x = e.clientX - rect.left - size / 2;
                    const y = e.clientY - rect.top - size / 2;
                    
                    ripple.style.cssText = `
                        position: absolute;
                        width: ${size}px;
                        height: ${size}px;
                        left: ${x}px;
                        top: ${y}px;
                        background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
                        border-radius: 50%;
                        transform: scale(0);
                        animation: ripple 0.6s ease-out;
                        pointer-events: none;
                        z-index: 0;
                    `;
                    
                    button.appendChild(ripple);
                    
                    setTimeout(() => {
                        ripple.remove();
                    }, 600);
                });

                // Add keyboard support
                button.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' || e.key === ' ') {
                        e.preventDefault();
                        button.click();
                    }
                });
            });

            // Video loading handler
            video.addEventListener('loadstart', function() {
                videoLoading.style.display = 'block';
            });

            video.addEventListener('canplay', function() {
                videoLoading.style.display = 'none';
            });

            video.addEventListener('error', function() {
                videoLoading.innerHTML = '<div style="color: #ff6b6b;">Video failed to load</div>';
            });

            // Add ripple animation keyframes
            const style = document.createElement('style');
            style.textContent = `
                @keyframes ripple {
                    to {
                        transform: scale(2);
                        opacity: 0;
                    }
                }
            `;
            document.head.appendChild(style);

            // Smooth scroll prevention for better performance
            document.addEventListener('touchmove', function(e) {
                if (e.target.tagName !== 'BUTTON') {
                    e.preventDefault();
                }
            }, { passive: false });

            // Preload optimization
            const preloadVideo = () => {
                if (video.readyState >= 3) {
                    videoLoading.style.display = 'none';
                }
            };

            video.addEventListener('progress', preloadVideo);
            video.addEventListener('canplaythrough', preloadVideo);

            // Performance optimization for mobile
            if (window.innerWidth <= 768) {
                video.preload = 'metadata';
            }
        });

        // Intersection Observer for performance
        if ('IntersectionObserver' in window) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.style.animationPlayState = 'running';
                    } else {
                        entry.target.style.animationPlayState = 'paused';
                    }
                });
            });

            document.querySelectorAll('.icon').forEach(el => {
                observer.observe(el);
            });
        }

        // Optimize for reduced motion preference
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
            document.documentElement.style.setProperty('--animation-duration', '0.01ms');
        }
    </script>
</body>
</html>
