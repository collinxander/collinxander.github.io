<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLIN XANDER</title>
    <link rel="icon" href="profilepic.jpg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @font-face {
            font-family: myFont;
            src: url(video.ttf);
        }

        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            background-color: black;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }
        
        /* Video background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        
        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);
            z-index: 0;
        }
        
        /* Logo */
        .logo-container {
            position: absolute;
            top: 2rem;
            left: 2rem;
            z-index: 10;
        }
        
        .logo {
            font-style: italic;
            color: red;
            font-size: 2.5rem;
            text-decoration: none;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7);
            position: relative;
            display: inline-block;
            letter-spacing: 2px;
            transform-style: preserve-3d;
            animation: logoFloat 4s ease-in-out infinite;
        }
        
        .logo::before {
            content: 'COLLIN XANDER';
            position: absolute;
            top: 0;
            left: 0;
            color: rgba(255, 0, 0, 0.5);
            filter: blur(8px);
            transform: translateZ(-10px);
        }
        
        .logo:hover {
            color: lime;
            animation: logoGlow 1s ease-in-out infinite alternate;
        }
        
        /* Main content */
        .main-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
            z-index: 1;
        }
        
        /* Navigation buttons */
        .nav-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-top: 2rem;
        }
        
        .nav-row {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        
        .nav-button {
            position: relative;
            font-family: myFont, Impact, sans-serif;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50px;
            padding: 1rem 2rem;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            text-decoration: none;
            display: inline-block;
            transform: translateY(0);
        }
        
        .nav-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.6s ease;
        }
        
        .nav-button:hover {
            color: lime;
            border-color: lime;
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 255, 0, 0.3);
        }
        
        .nav-button:hover::before {
            left: 100%;
        }
        
        .nav-button.contact {
            color: #ff3d3d;
            border-color: #ff3d3d;
        }
        
        .nav-button.contact:hover {
            color: lime;
            border-color: lime;
        }
        
        .nav-button.xander-mix {
            color: #87CEEB;
            border-color: #87CEEB;
        }
        
        .nav-button.xander-mix:hover {
            color: lime;
            border-color: lime;
        }
        
        /* Button icons */
        .button-icon {
            margin-right: 0.5rem;
            font-size: 1.2rem;
            transition: transform 0.3s ease;
        }
        
        .nav-button:hover .button-icon {
            transform: scale(1.2);
        }
        
        /* Footer */
        .footer {
            position: absolute;
            bottom: 1rem;
            width: 100%;
            text-align: center;
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.7);
            z-index: 10;
            padding: 1rem;
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 1rem;
        }
        
        .social-link {
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }
        
        .social-link:hover {
            color: lime;
            transform: translateY(-5px);
        }
        
        .copyright {
            font-family: Arial, sans-serif;
            font-size: 0.9rem;
            opacity: 0.8;
        }
        
        /* Animations */
        @keyframes logoFloat {
            0%, 100% {
                transform: translateY(0) rotateX(10deg);
            }
            50% {
                transform: translateY(-10px) rotateX(15deg);
            }
        }
        
        @keyframes logoGlow {
            0% {
                text-shadow: 0 0 10px lime, 0 0 20px lime;
            }
            100% {
                text-shadow: 0 0 20px lime, 0 0 30px lime, 0 0 40px lime;
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Responsive design */
        @media (max-width: 768px) {
            .logo-container {
                top: 1.5rem;
                left: 1.5rem;
            }
            
            .logo {
                font-size: 2rem;
            }
            
            .nav-button {
                font-size: 1.2rem;
                padding: 0.8rem 1.5rem;
            }
            
            .nav-row {
                gap: 1rem;
            }
            
            .nav-container {
                gap: 1.5rem;
            }
            
            .social-link {
                font-size: 1.2rem;
            }
        }
        
        @media (max-width: 480px) {
            .logo-container {
                top: 1rem;
                left: 1rem;
            }
            
            .logo {
                font-size: 1.5rem;
            }
            
            .nav-button {
                font-size: 1rem;
                padding: 0.7rem 1.2rem;
            }
            
            .nav-row {
                flex-direction: column;
                gap: 1rem;
            }
            
            .nav-container {
                gap: 1rem;
            }
            
            .social-link {
                font-size: 1rem;
            }
            
            .copyright {
                font-size: 0.8rem;
            }
        }
        
        /* Animation classes for staggered entrance */
        .animate-fade-in {
            opacity: 0;
            animation: fadeIn 0.8s ease forwards;
        }
        
        .delay-1 {
            animation-delay: 0.2s;
        }
        
        .delay-2 {
            animation-delay: 0.4s;
        }
        
        .delay-3 {
            animation-delay: 0.6s;
        }
        
        .delay-4 {
            animation-delay: 0.8s;
        }
        
        .delay-5 {
            animation-delay: 1s;
        }
    </style>
</head>
<body>
    <!-- Video Background -->
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="homevideo.MP4" type="video/mp4">
        </video>
    </div>
    
    <!-- Overlay -->
    <div class="video-overlay"></div>
    
    <!-- Logo -->
    <div class="logo-container">
        <a href="./" class="logo">COLLIN XANDER</a>
    </div>
    
    <!-- Main Content -->
    <main class="main-content">
        <div class="nav-container">
            <div class="nav-row">
                <a href="./Photos" class="nav-button animate-fade-in delay-1">
                    <i class="fas fa-camera button-icon"></i>PHOTOS
                </a>
                <a href="./videos" class="nav-button animate-fade-in delay-2">
                    <i class="fas fa-video button-icon"></i>VIDEOS
                </a>
                <a href="./About" class="nav-button animate-fade-in delay-3">
                    <i class="fas fa-user button-icon"></i>ABOUT
                </a>
            </div>
            
            <div class="nav-row">
                <a href="./Contact" class="nav-button contact animate-fade-in delay-4">
                    <i class="fas fa-envelope button-icon"></i>CONTACT
                </a>
                <a href="https://collinxander.com/Sound-Visualizer/" class="nav-button xander-mix animate-fade-in delay-5">
                    <i class="fas fa-music button-icon"></i>XANDER MIX
                </a>
            </div>
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <div class="social-links">
            <a href="https://instagram.com/collinxander.jpeg" target="_blank" class="social-link">
                <i class="fab fa-instagram"></i>
            </a>
            <a href="mailto:collinxander1@gmail.com" class="social-link">
                <i class="fas fa-envelope"></i>
            </a>
        </div>
        <div class="copyright">
            &copy; <span id="current-year"></span> Collin Xander. All Rights Reserved.
        </div>
    </footer>
</body>
</html>
