 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLIN XANDER</title>
    <link rel="icon" href="profilepic.jpg" type="image/x-icon">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>

        * {
            box-sizing: border-box;
            padding: 0;
            margin: 0;
        }

        body {
            background-color: black;
            font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        .page-container {
            opacity: 0;
            animation: fadeIn 1.5s ease-in-out forwards;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            z-index: 1;
        }

        video {
            object-fit: cover;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .icon {
            overflow: hidden;
            position: absolute;
            top: 0;
            left: 0;
            padding: 12px;
            text-decoration: none;
            font-style: italic;
            color: red;
            font-size: 27px;
            text-shadow: 0 0 10px rgba(255, 0, 0, 0.7), 0 0 20px rgba(255, 0, 0, 0.5);
            transform: perspective(500px) rotateX(15deg);
            animation: glow 1.5s ease-in-out infinite alternate, rotate3d 10s linear infinite;
            z-index: 10;
            transition: color 0.3s ease;
        }

        .icon:hover {
            color: lime;
        }

        @keyframes glow {
            0% { text-shadow: 0 0 5px rgba(255, 0, 0, 0.7), 0 0 10px rgba(255, 0, 0, 0.5); }
            100% { text-shadow: 0 0 10px rgba(255, 0, 0, 0.7), 0 0 20px rgba(255, 0, 0, 0.5), 0 0 30px rgba(255, 0, 0, 0.3); }
        }

        @keyframes rotate3d {
            0% { transform: perspective(500px) rotateY(0deg); }
            100% { transform: perspective(500px) rotateY(360deg); }
        }

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            position: relative;
            z-index: 10;
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.5s;
        }

        .button-container.prices {
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.8s ease-out forwards;
            animation-delay: 0.9s;
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        button {
            font-family: myFont, Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
            color: white;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px 30px;
            font-size: 25px;
            font-weight: bold;
            border: 2px solid white;
            transition: all 0.5s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5), inset 0 -5px 10px rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
            cursor: pointer;
            backdrop-filter: blur(5px);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 200px;
        }

        button:hover {
            color: lime;
            background: rgba(0, 0, 0, 0.8);
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 255, 0, 0.3), inset 0 -10px 20px rgba(255, 255, 255, 0.3);
            border-color: lime;
        }

        .prices button {
            color: red;
            border: 2px solid white;
        }

        .prices button:hover {
            color: lime;
            border-color: lime;
        }

        /* XANDER MIX button styling */
        #buttonXanderMix {
            color: #87CEEB; /* Light blue */
            border-color: #87CEEB;
            box-shadow: 0 5px 15px rgba(135, 206, 235, 0.3), inset 0 -5px 10px rgba(255, 255, 255, 0.2);
        }

        #buttonXanderMix:hover {
            color: lime;
            border-color: lime;
            box-shadow: 0 10px 25px rgba(0, 255, 0, 0.3), inset 0 -10px 20px rgba(255, 255, 255, 0.3);
        }

        /* Icon styling */
        .btn-icon {
            margin-right: 12px;
            font-size: 0.9em;
        }

        button:hover .btn-icon {
            transform: scale(1.2);
            transition: transform 0.3s ease;
        }

        footer {
            position: absolute;
            bottom: 10px;
            width: 100%;
            text-align: center;
            font-size: 14px;
            color: white;
            z-index: 10;
            text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
            opacity: 0;
            animation: fadeIn 0.8s ease-out forwards;
            animation-delay: 1.3s;
        }

        /* Social icons in footer */
        .social-icons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
        }

        .social-icon {
            color: white;
            font-size: 18px;
            transition: all 0.3s ease;
            opacity: 0.7;
        }

        .social-icon:hover {
            color: lime;
            opacity: 1;
            transform: translateY(-3px);
        }

        /* Enhanced responsive design */
        @media screen and (max-width: 820px) {
            .icon {
                font-size: 20px;
                padding: 8px;
            }

            button {
                font-size: 22px;
                padding: 15px 25px;
                min-width: 180px;
            }

            .button-container {
                gap: 15px;
            }

            .button-container.prices {
                margin-top: 30px;
            }
        }

        @media screen and (max-width: 480px) {
            .icon {
                font-size: 18px;
                padding: 6px;
            }

            button {
                font-size: 18px;
                padding: 12px 20px;
                min-width: 160px;
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .button-container.prices {
                margin-top: 20px;
                flex-direction: column;
                align-items: center;
                gap: 12px;
            }

            .btn-icon {
                margin-right: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Background video -->
        <video autoplay loop muted playsinline>
            <source src="homevideo.MP4" type="video/mp4">
            <!-- Fallback for browsers that don't support video -->
        </video>
        <div class="background-overlay"></div>

        <!-- Logo/Brand -->
        <a href="./" class="icon">COLLIN XANDER</a>

        <!-- Main content -->
        <div class="container">
            <div class="button-container">
                <form action="./Photos">
                    <button id="btnOne">
                        <i class="fa-solid fa-camera btn-icon"></i>
                        PHOTOS
                    </button>
                </form>
                <form action="./videos">
                    <button id="buttonTwo">
                        <i class="fa-solid fa-video btn-icon"></i>
                        VIDEOS
                    </button>
                </form>
                <form action="./About">
                    <button id="buttonAbout">
                        <i class="fa-solid fa-user btn-icon"></i>
                        ABOUT
                    </button>
                </form>
            </div>
            <div class="button-container prices">
                <form action="./Contact">
                    <button id="buttonPrices">
                        <i class="fa-solid fa-envelope btn-icon"></i>
                        CONTACT
                    </button>
                </form>
                <form action="https://collinxander.com/Sound-Visualizer/">
                    <button id="buttonXanderMix">
                        <i class="fa-solid fa-music btn-icon"></i>
                        XANDER MIX
                    </button>
                </form>
            </div>
        </div>

        <!-- Footer with social icons -->
        <footer>
            <div>© <script>document.write(new Date().getFullYear())</script> Collin Xander. All rights reserved.</div>
            <div class="social-icons">
                <a href="#" class="social-icon"><i class="fa-brands fa-instagram"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-youtube"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-twitter"></i></a>
                <a href="#" class="social-icon"><i class="fa-brands fa-facebook"></i></a>
            </div>
        </footer>
    </div>

    <script>
        // Add any JavaScript functionality here
        document.addEventListener('DOMContentLoaded', function() {
            // Ensure smooth animations when page loads
            setTimeout(function() {
                document.querySelector('.page-container').style.opacity = '1';
            }, 100);
            
            // Add hover effect for buttons with enhanced interaction
            const buttons = document.querySelectorAll('button');
            buttons.forEach(button => {
                button.addEventListener('mouseover', function() {
                    this.style.transition = 'all 0.5s ease';
                    const icon = this.querySelector('.btn-icon');
                    if (icon) {
                        icon.style.transform = 'scale(1.2)';
                        icon.style.transition = 'transform 0.3s ease';
                    }
                });
                
                button.addEventListener('mouseout', function() {
                    this.style.transition = 'all 0.8s ease';
                    const icon = this.querySelector('.btn-icon');
                    if (icon) {
                        icon.style.transform = 'scale(1)';
                    }
                });
            });
        });
    </script>
</body>
</html>
